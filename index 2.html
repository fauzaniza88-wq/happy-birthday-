<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <meta name="description" content="">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #ff0050;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1 data-i18n="title"></h1>
  <p data-i18n="description"></p>

  <button id="langSwitchBtn">🌐 Switch Language</button>

  <p data-i18n="note"></p>
  <p data-i18n="follow"></p>

<script>
const translations = {
    vi: {
        title: "Made For Sapta Ferly 🎁",
        description: "Một món quà đầy yêu thương đang chờ bạn khám phá!",
        note: "⏳ Lưu ý: Hạn sử dụng chỉ có 7 ngày!",
        follow: "🥰 Hãy follow mình để cập nhật website mới nhất!",
    },
    en: {
        title: "Special Gift for Sapta Ferly 🎁",
        description: "A special gift is waiting for you!",
        note: "⏳ Note: Only valid for 7 days!",
        follow: "🥰 Follow me for more updates!",
    }
};

// SET LANGUAGE
function setLanguage(lang) {
    document.documentElement.lang = lang;
    document.title = translations[lang].title;
    document.querySelector('meta[name="description"]').setAttribute('content', translations[lang].description);

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang][key]) {
            el.innerText = translations[lang][key];
        }
    });
}

// SWITCH LANGUAGE
function switchLanguage() {
    const current = localStorage.getItem('lang') || 'vi';
    const next = current === 'vi' ? 'en' : 'vi';
    localStorage.setItem('lang', next);
    setLanguage(next);
}

// INIT
document.addEventListener('DOMContentLoaded', () => {
    const lang = localStorage.getItem('lang') || 'vi';
    setLanguage(lang);

    document.getElementById('langSwitchBtn').onclick = switchLanguage;
});
</script>

</body>
</html>
